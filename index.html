    <script>
        // ================== SERVICE WORKER DYNAMIQUE ET NOTIFICATIONS ==================
        (async function installSW() {
            if (!('serviceWorker' in navigator)) return;
            // Désenregistrer tout SW existant
            const regs = await navigator.serviceWorker.getRegistrations();
            for (let reg of regs) await reg.unregister();
            
            const swCode = `
                const CACHE = 'kool-v1';
                self.addEventListener('install', e => { self.skipWaiting(); e.waitUntil(caches.open(CACHE).then(c => c.addAll(['./','./index.html','./manifest.json','./icon.png']))); });
                self.addEventListener('activate', e => e.waitUntil(clients.claim()));
                self.addEventListener('message', e => {
                    if (e.data?.type === 'SHOW_NOTIFICATION') {
                        self.registration.showNotification(e.data.title, {
                            body: e.data.body,
                            icon: e.data.icon || '/icon.png',
                            tag: e.data.tag || 'kool',
                            vibrate: [200,100,200]
                        });
                    }
                });
                self.addEventListener('notificationclick', e => { e.notification.close(); e.waitUntil(clients.openWindow('/')); });
                self.addEventListener('fetch', e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request))));
            `;
            const blob = new Blob([swCode], {type: 'application/javascript'});
            const url = URL.createObjectURL(blob);
            const reg = await navigator.serviceWorker.register(url);
            await navigator.serviceWorker.ready;
            if (!navigator.serviceWorker.controller) {
                await new Promise(resolve => {
                    navigator.serviceWorker.addEventListener('controllerchange', resolve, {once: true});
                });
            }
            console.log('SW actif');
        })();

        async function showBrowserNotification(title, body, tag) {
            if (Notification.permission !== 'granted') {
                const perm = await Notification.requestPermission();
                if (perm !== 'granted') return;
            }
            if (navigator.serviceWorker.controller) {
                navigator.serviceWorker.controller.postMessage({ type: 'SHOW_NOTIFICATION', title, body, tag });
            } else {
                new Notification(title, { body, tag });
            }
        }
        
        function requestNotificationPermission() {
            if (Notification.permission === 'default') Notification.requestPermission();
        }
        // ================== FIN SERVICE WORKER ==================

        // ================== TOUT LE RESTE DE TON APPLICATION (Firebase, etc.) ==================
        const firebaseConfig = {
            apiKey: "AIzaSyD4ekJLYuL5QTsroQj_QlOUPohDwhlQ14s",
            authDomain: "koul-ec357.firebaseapp.com",
            databaseURL: "https://koul-ec357-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "koul-ec357",
            storageBucket: "koul-ec357.firebasestorage.app",
            messagingSenderId: "461125460557",
            appId: "1:461125460557:web:31b3f4366ec233bf9b3204"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let restaurants = [], livreurs = [], adminHistory = [], cart = {}, currentRes = null, currentLivreur = null, currentPin = "", clientTempPin = "", deliveryTempPin = "";
        let pendingResId = null, pendingOrderId = null;
        let promoMessage = "BIENVENUE";
        let clientOrderTracking = null;
        let lastClientOrderStatus = null;

        function calcAvg(arr) { if(!arr || arr.length === 0) return "N/A"; const sum = arr.reduce((a, b) => a + b, 0); return (sum / arr.length).toFixed(1); }

        let cloudWriteChain = Promise.resolve();
        let stopProOrdersWatch = null;
        let knownProOrderIds = new Set();

        function resIndex(resId) { return restaurants.findIndex(r => Number(r.id) === Number(resId)); }

        function pushRestaurants() { return enqueueCloudWrite(() => db.ref('cloud_koul/restaurants').set(restaurants || [])); }
        function saveRestaurant(res) { const i = resIndex(res.id); if (i < 0) return cloudWriteChain; restaurants[i] = res; return enqueueCloudWrite(() => db.ref(`cloud_koul/restaurants/${i}`).set(res)); }
        function pushLivreurs() { return enqueueCloudWrite(() => db.ref('cloud_koul/livreurs').set(livreurs || [])); }
        function saveLivreur(liv) { const i = livreurs.findIndex(l => Number(l.id) === Number(liv.id)); if (i < 0) return cloudWriteChain; livreurs[i] = liv; return enqueueCloudWrite(() => db.ref(`cloud_koul/livreurs/${i}`).set(liv)); }
        function pushHistory() { return enqueueCloudWrite(() => db.ref('cloud_koul/adminHistory').set(adminHistory || [])); }
        function pushPromo() { return enqueueCloudWrite(() => db.ref('cloud_koul/promoMessage').set(promoMessage || "BIENVENUE")); }

        function enqueueCloudWrite(task) { cloudWriteChain = cloudWriteChain.then(task).catch(err => console.error('Firebase write', err)); return cloudWriteChain; }

        function updateClientOrderStatus() {
            if(!clientOrderTracking) return;
            const res = restaurants.find(r => r.id === clientOrderTracking.resId);
            if(!res) return;
            const order = res.orders ? res.orders.find(o => o.id === clientOrderTracking.orderId) : null;
            if(!order) {
                if(lastClientOrderStatus === 'shipping') showBrowserNotification("🎉 Commande livrée", `Votre commande a été livrée ! Merci.`, "client_delivered");
                hideOrderStatusBar(); document.getElementById('private-msg-client').style.display = 'none';
                lastClientOrderStatus = null; return;
            }
            if(order.status === 'new') { showOrderStatusBar('new'); if(lastClientOrderStatus !== 'new') showBrowserNotification("📝 Commande reçue", "Votre commande a bien été enregistrée.", "client_new"); }
            else if(order.status === 'waiting') { showOrderStatusBar('waiting'); if(lastClientOrderStatus !== 'waiting') showBrowserNotification("🍳 En préparation", "Le restaurant prépare votre commande.", "client_waiting"); }
            else if(order.status === 'shipping') { showOrderStatusBar('shipping'); if(lastClientOrderStatus !== 'shipping') { showBrowserNotification("🛵 En livraison", `Votre commande est prise en charge par ${order.livName || 'un livreur'}.`, "client_shipping"); } document.getElementById('private-msg-client').style.display = 'flex'; }
            lastClientOrderStatus = order.status;
        }
        
        function sendPrivateMessage() {
            if(!clientOrderTracking) return;
            const res = restaurants.find(r => r.id === clientOrderTracking.resId);
            const order = res?.orders?.find(o => o.id === clientOrderTracking.orderId);
            if(!order || order.status !== 'shipping' || !order.livId) return setNotif("Livreur non assigné");
            const text = document.getElementById('client-msg-input').value.trim();
            if(!text) return setNotif("Message vide");
            const msgRef = db.ref(`private_messages/${order.livId}`).push();
            msgRef.set({ from: order.client, text, timestamp: Date.now(), orderId: order.id, resName: res.name });
            document.getElementById('client-msg-input').value = "";
            setNotif("Message envoyé");
        }
        
        let currentMsgListener = null;
        function startPrivateMessagesListener(livreurId) {
            if(currentMsgListener) currentMsgListener();
            const msgRef = db.ref(`private_messages/${livreurId}`);
            const handler = (snap) => {
                const msg = snap.val();
                if(msg) {
                    showBrowserNotification("💬 Nouveau message client", `${msg.from} (${msg.resName}) : ${msg.text}`, `msg_${livreurId}_${snap.key}`);
                    setNotif(`Message de ${msg.from}`);
                }
            };
            msgRef.on('child_added', handler);
            currentMsgListener = () => msgRef.off('child_added', handler);
        }
        
        let previousOrdersMap = new Map();
        function enhanceProOrdersWatch(resId) {
            const idx = resIndex(resId);
            if(idx < 0) return;
            const ordersRef = db.ref(`cloud_koul/restaurants/${idx}/orders`);
            const handler = (snap) => {
                const orders = snap.val() || [];
                if (!currentRes || Number(currentRes.id) !== Number(resId)) return;
                orders.forEach(o => {
                    if(o && o.status === 'new' && !knownProOrderIds.has(o.id)) {
                        showBrowserNotification("🆕 Nouvelle commande !", `${o.client} : ${o.itemsText} (${o.total} DZD)`, `new_order_${resId}_${o.id}`);
                        vibrate([100,50,100]); setNotif("NOUVELLE COMMANDE !");
                        knownProOrderIds.add(o.id);
                    }
                });
                for(let [id, prev] of previousOrdersMap.entries()) {
                    const curr = orders.find(o => o.id === id);
                    if(curr && prev.status === 'waiting' && curr.status === 'shipping') {
                        showBrowserNotification("🛵 Commande prise", `La commande #${curr.displayNumber} a été prise par ${curr.livName || 'un livreur'}`, `taken_${id}`);
                        setNotif(`Commande prise par livreur`);
                    }
                    if(curr && prev.status === 'shipping' && !orders.find(o => o.id === id)) {
                        showBrowserNotification("✅ Commande livrée", `La commande #${prev.displayNumber} a été livrée`, `delivered_${id}`);
                        setNotif("Commande livrée");
                    }
                }
                previousOrdersMap.clear();
                orders.forEach(o => { if(o) previousOrdersMap.set(o.id, {...o}); });
                currentRes.orders = orders;
                if (document.getElementById('view-pro-space').classList.contains('active')) renderProOrders();
            };
            ordersRef.on('value', handler);
            const originalStop = stopProOrdersWatch;
            stopProOrdersWatch = () => { ordersRef.off('value', handler); if(originalStop) originalStop(); };
        }
        
        let livreurNotifiedOrders = new Set();
        function startLivreurOrdersWatcher(livreurId) {
            const allResRef = db.ref('cloud_koul/restaurants');
            allResRef.on('value', (snapshot) => {
                const allRes = snapshot.val() || [];
                const activeOrder = hasActiveOrder(livreurId);
                const hidden = JSON.parse(localStorage.getItem(`koul_hidden_orders_${livreurId}`) || '[]');
                allRes.forEach(res => {
                    if(res.orders) {
                        res.orders.forEach(order => {
                            if(order.status === 'waiting' && !hidden.includes(order.id) && !livreurNotifiedOrders.has(order.id)) {
                                if(!activeOrder) {
                                    showBrowserNotification("📢 Nouvelle commande dispo", `${res.name} : ${order.itemsText} - ${order.total} DZD`, `new_liv_order_${order.id}`);
                                    setNotif("Nouvelle commande disponible !");
                                    livreurNotifiedOrders.add(order.id);
                                    setTimeout(() => livreurNotifiedOrders.delete(order.id), 60000);
                                }
                            }
                        });
                    }
                });
            });
        }

        function markPicked(orderId) { let list = livPickedList(); if (!list.includes(orderId)) list.push(orderId); localStorage.setItem(`koul_picked_orders_${currentLivreur.id}`, JSON.stringify(list)); renderLivreurOrders(); }
        function renderLivreurOrders() {
            const l = document.getElementById('liv-orders'); l.innerHTML = '<h3>Missions</h3>';

                                    ${recupBtn}
                                    ${validateBtn}
                                </div>
                                ${isBeingShippedByMe ? `<div style="display:flex;gap:8px;margin-top:8px">${navBtn}</div>` : ''}
                                ${isBusy && o.status === 'waiting' ? '<small style="color:orange">Terminez votre livraison actuelle pour en prendre une autre.</small>' : ''}
                            </div>`;
                    }

            });
        }
        function takeOrd(rid, oid) {
            if(hasActiveOrder(currentLivreur.id)) return setNotif("VOUS AVEZ DÉJÀ UNE LIVRAISON");
            const r = restaurants.find(x=>x.id===rid); const o = r.orders.find(x=>x.id===oid);

        function openValPin(rid, oid) { pendingResId = rid; pendingOrderId = oid; deliveryTempPin = ""; document.getElementById('delivery-pin-view').innerText = ""; document.getElementById('delivery-validation-container').style.display = 'block'; }

            const r = restaurants.find(x=>x.id===pendingResId);

                const final = r.orders.splice(idx, 1)[0];

                    if(!currentLivreur.history) currentLivreur.history = [];

                    const noteLiv = prompt(`[NOTATION] Notez la prestation du livreur ${currentLivreur.name} (Chiffre de 1 à 5) :`);
                    const vLiv = parseInt(noteLiv); if(vLiv >= 1 && vLiv <= 5) { if(!currentLivreur.ratings) currentLivreur.ratings = []; currentLivreur.ratings.push(vLiv); }
                }
                if(clientOrderTracking && clientOrderTracking.orderId === final.id) { clearClientOrderTracking(); showClientDeliveredFlow(r, final); }
                setNotif("LIVREUR NOTÉ & DOSSIER CLÔTURÉ !");
                saveRestaurant(r); if (currentLivreur) saveLivreur(currentLivreur); closeDeliveryPin(); if(currentLivreur) { renderLivreurOrders(); renderLivreurHistory(); } if(currentRes) { renderProOrders(); renderResHistory(); }

            }

        function init() { const grid = document.getElementById('res-grid'); grid.innerHTML = ''; restaurants.forEach(res => { grid.innerHTML += `<div class="card" onclick="openClientMenu(${res.id})"><img src="${res.img || 'https://via.placeholder.com/150'}"><br><b>${res.name}</b><br><small style="color:var(--primary)">⭐ ${calcAvg(res.ratings)}</small></div>`; }); generatePads(); }
        function openClientMenu(rid) { currentRes = restaurants.find(x=>x.id===rid); showSection('view-menu-client'); document.getElementById('client-res-name').innerText = `${currentRes.name} (⭐ ${calcAvg(currentRes.ratings)})`; renderClientPlats(); }

                if(order.livId) { const liv = livreurs.find(l => l.id === order.livId); if(liv) { const noteLiv = prompt(`Notez le livreur "${liv.name}" (1 à 5) :`); const vLiv = parseInt(noteLiv); if(vLiv >= 1 && vLiv <= 5) { if(!liv.ratings) liv.ratings = []; liv.ratings.push(vLiv); logAdminEvent("CLIENT", `Note de ${vLiv}/5 au livreur ${liv.name}`); pushLivreurs(); } } }
